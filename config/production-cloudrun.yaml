# Cloud Run production instance configuration.
# Loaded by node-config when NODE_ENV=production and NODE_APP_INSTANCE=cloudrun.
#
# Secrets: SESSION_PASSWORD is injected from Google Secret Manager.
# app.url.hostname: injected via NODE_CONFIG env var by deploy-cloudrun.sh after
#   the service URL is known. No manual editing required.

app:
  url:
    protocol: https
    hostname: ''   # Overridden at runtime via NODE_CONFIG — see deploy-cloudrun.sh
    port:
    # All hostnames this deployment is reachable under (custom domain, .run.app URL,
    # tagged candidate URLs). Used by trinket-markdown and material-parser to
    # recognise embed URLs in stored content regardless of which host created them.
    knownHosts:
      - trinket-349223059011.us-central1.run.app
      - trinket-dcejhn2ywa-uc.a.run.app
  hostname: 0.0.0.0
  plugins:
    session:
      cookieOptions:
        password: ''   # Injected via SESSION_PASSWORD env var from Secret Manager
        domain: ''
        isSecure: true
        isSameSite: 'None'
      cache:
        backend: firestore

lti:
  # UIndy: trust the LMS-asserted Instructor role (portable/oss default). The
  # 'instructormi' Datastore allowlist is matterandinteractions-specific and does
  # not resolve in this project.
  instructorAuthority: default

db:
  backend: firestore   # No MongoDB required
  redis:
    enabled: false
  # db.firestore.projectId is not set here; the Firestore SDK reads
  # GOOGLE_CLOUD_PROJECT automatically on Cloud Run.

storage:
  backend: gcs

# features.assets requires gs://trinket-uindy-materials to exist with the Cloud Run
# service account having roles/storage.objectAdmin on that bucket.
features:
  assets: true

aws:
  buckets:
    materials:
      name: trinket-uindy-materials
      host: https://storage.googleapis.com/trinket-uindy-materials
    userassets:
      name: trinket-uindy-user-assets
      host: https://storage.googleapis.com/trinket-uindy-user-assets
    useravatars:
      name: trinket-uindy-user-assets
      host: https://storage.googleapis.com/trinket-uindy-user-assets
    snapshots:
      name: trinket-uindy-snapshots
      host: https://storage.googleapis.com/trinket-uindy-snapshots

# adminEmails and firebase.clientConfig are injected via NODE_CONFIG env var at deploy time.
# See deploy-cloudrun.sh and .env (ADMIN_EMAILS, FIREBASE_CLIENT_CONFIG).
auth:
  adminEmails: []
  firebase:
    projectId: trinket-uindy
    clientConfig: {}
