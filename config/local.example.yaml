# Trinket Local Configuration
# Copy this file to local.yaml: cp config/local.example.yaml config/local.yaml
# IMPORTANT: Never commit local.yaml to version control

# =============================================================================
# REQUIRED
# =============================================================================

app:
  url:
    protocol: http
    hostname: localhost
    port: 3000

  plugins:
    session:
      cookieOptions:
        # CHANGE THIS - must be at least 32 characters
        password: 'change-this-to-a-secure-password-min-32-chars!'
        domain: ''
        isSecure: false  # Set true in production with HTTPS

# =============================================================================
# DATABASE
# =============================================================================

db:
  mongo:
    host: mongodb      # Use 'mongodb' for Docker, 'localhost' for local
    port: 27017
    database: trinket

  # Redis is OPTIONAL - sessions work without it
  redis:
    enabled: false

# =============================================================================
# OPTIONAL: Email (for password reset)
# =============================================================================
# Without email, users can still register and log in, but password reset won't work.

# app:
#   mail:
#     from: 'noreply@example.com'
#     host: 'smtp.example.com'
#     port: 587
#     user: 'your-smtp-username'
#     pass: 'your-smtp-password'

# =============================================================================
# OPTIONAL: File Storage (for asset uploads in trinkets)
# =============================================================================
# Without S3, the asset upload feature is disabled. Code still works fine.

# features:
#   assets: true
#
# aws:
#   keyId: 'your-access-key-id'
#   key: 'your-secret-key'
#   region: 'us-east-1'
#   # For S3-compatible storage such as Garage:
#   # endpoint: 'http://garage:3900'
#   # s3ForcePathStyle: true
#   # signatureVersion: 'v4'
#   buckets:
#     userassets:
#       name: 'your-bucket-name'
#       host: 'https://your-bucket.s3.amazonaws.com'

# Docker Compose includes a local Garage service for S3-compatible storage.
# The app container is configured with NODE_CONFIG in docker-compose.yml. If you
# run Trinket outside Docker and still want to use that Garage service, use:
#
# features:
#   assets: true
#
# aws:
#   keyId: 'trinket-dev-key'
#   key: 'trinket-dev-secret-key'
#   region: 'garage'
#   endpoint: 'http://localhost:3900'
#   s3ForcePathStyle: true
#   signatureVersion: 'v4'
#   buckets:
#     userassets:
#       name: 'trinket-userassets'
#       host: 'http://trinket-userassets.localhost:3902'
#       thumbnail: 'thumb-%{s}'
#       thumbnailHost: 'http://trinket-userassets.localhost:3902'
#       thumbnailBucket: 'trinket-userassets'
#     snapshots:
#       name: 'trinket-snapshots'
#       host: 'http://trinket-snapshots.localhost:3902'
#     materials:
#       name: 'trinket-materials'
#       host: 'http://trinket-materials.localhost:3902'
#     useravatars:
#       name: 'trinket-useravatars'
#       host: 'http://trinket-useravatars.localhost:3902'
#     exports:
#       name: 'trinket-exports'
#       host: 'http://trinket-exports.localhost:3902'

