name: tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: vpython async-transform tests (python, no deps)
        run: python3 test/lib/wvpython/test_async_transform.py
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: node --version
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      - name: Run tests
        run: npm test
