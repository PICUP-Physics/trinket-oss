<!DOCTYPE html>
<html>
<head>
<style>body{margin:8px;font-family:monospace;font-size:12px;}</style>
</head>
<body>
<div id="glowscript" style="display:none"></div>
<pre id="log"></pre>
<script>
function log(msg) {
  document.getElementById('log').textContent += msg + '\n';
  console.log(msg);
}
log('body children at script start: ' + document.body.children.length);
log('$("body") is: ' + (typeof $ !== 'undefined' ? $('body').length + ' elements' : 'jQuery not loaded'));

// Load scripts sequentially via createElement (NO appendTo patch)
function loadScript(src, cb) {
  var s = document.createElement('script');
  s.src = src;
  s.onload = cb;
  document.head.appendChild(s);
}

loadScript('http://localhost:3001/components/vpython-glowscript/lib/jquery/2.1/jquery.min.js', function() {
  log('jQuery loaded, $("body").length=' + $('body').length);
  
  loadScript('http://localhost:3001/components/vpython-glowscript/package/glow.3.2.3.min.js', function() {
    log('glow loaded');
    log('GSprint: ' + typeof window.GSprint);
    
    // Check what poptions.place captured during glow init
    // We can't access it directly (it's closed over), but we can test
    window.__context = { glowscript_container: $('#glowscript') };
    
    loadScript('http://localhost:3001/components/vpython-glowscript/package/RScompiler.3.2.3.min.js', function() {
      log('compiler loaded');
      runTest();
    });
  });
});

function runTest() {
  var prog = 'Web VPython 3.2\nprint("hello from vpython")\n';
  var compiled = window.glowscript_compile(prog, {lang:'vpython', version:'3.2.3'});
  log('Compiled OK');

  async function run() {
    log('=== RUNNING ===');
    try {
      eval(compiled);
      await __main__();
      log('done');
    } catch(e) {
      log('ERROR: ' + e.message);
    }
    log('textarea exists: ' + !!document.getElementById('print'));
    if (document.getElementById('print')) {
      log('textarea value: ' + document.getElementById('print').value);
    }
    log('body HTML: ' + document.body.innerHTML.slice(0, 300));
  }
  setTimeout(run, 200);
}
</script>
</body>
</html>
