<!DOCTYPE html>
<html>
<head>
<script src="http://localhost:3001/components/vpython-glowscript/lib/jquery/2.1/jquery.min.js"></script>
<script src="http://localhost:3001/components/vpython-glowscript/lib/jquery/2.1/jquery-ui.custom.min.js"></script>
<style>body{margin:8px;font-family:monospace;font-size:12px;white-space:pre}</style>
</head>
<body>
<div id="glowscript" style="display:none"></div>
<div id="log"></div>
<script>
function log(msg) {
  document.getElementById('log').textContent += msg + '\n';
  console.log(msg);
}

// Load glow script MANUALLY so we can patch the print function before eval
var script = document.createElement('script');
script.src = 'http://localhost:3001/components/vpython-glowscript/package/glow.3.2.3.min.js';
script.onload = function() {
  log('glow loaded, GSprint defined: ' + (typeof window.GSprint));
  
  // Now patch the actual print function source by finding printarea
  // Check if printarea is exposed anywhere
  log('window.printarea: ' + typeof window.printarea);

  var compilerScript = document.createElement('script');
  compilerScript.src = 'http://localhost:3001/components/vpython-glowscript/package/RScompiler.3.2.3.min.js';
  compilerScript.onload = function() {
    log('compiler loaded');
    runTest();
  };
  document.head.appendChild(compilerScript);
};
document.head.appendChild(script);

function runTest() {
  window.__context = { glowscript_container: $('#glowscript') };
  
  // Patch jQuery's appendTo to trace when #print textarea gets added
  var origAppendTo = $.fn.appendTo;
  $.fn.appendTo = function(target) {
    var result = origAppendTo.apply(this, arguments);
    // Check if this is the print textarea
    if (this[0] && this[0].tagName === 'TEXTAREA') {
      log('[jQuery.appendTo] textarea appended! id=' + this[0].id + ' to=' + $(target).prop('id'));
      log('  document.getElementById("print") now: ' + !!document.getElementById('print'));
      log('  textarea in DOM: ' + document.body.contains(this[0]));
    }
    return result;
  };

  var prog = 'Web VPython 3.2\nprint("hello from vpython")\n';
  var compiled = window.glowscript_compile(prog, {lang:'vpython', version:'3.2.3'});
  log('Compiled OK, length=' + compiled.length);

  async function run() {
    log('\n=== RUNNING ===');
    try {
      eval(compiled);
      await __main__();
      log('__main__() done');
    } catch(e) {
      log('ERROR: ' + e.message + '\n' + e.stack.slice(0,400));
    }
    log('textarea#print: ' + (document.getElementById('print') ? 'EXISTS' : 'NULL'));
    log('body children count: ' + document.body.children.length);
    log('body innerHTML snippet: ' + document.body.innerHTML.slice(0,200));
  }
  setTimeout(run, 300);
}
</script>
</body>
</html>
