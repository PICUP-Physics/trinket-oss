<!DOCTYPE html>
<html>
<head>
<script src="http://localhost:3001/components/vpython-glowscript/lib/jquery/2.1/jquery.min.js"></script>
<script src="http://localhost:3001/components/vpython-glowscript/lib/jquery/2.1/jquery-ui.custom.min.js"></script>
<script src="http://localhost:3001/components/vpython-glowscript/package/glow.3.2.3.min.js"></script>
<script src="http://localhost:3001/components/vpython-glowscript/package/RScompiler.3.2.3.min.js"></script>
<style>body{margin:8px;font-family:monospace;font-size:12px;white-space:pre}</style>
</head>
<body>
<div id="glowscript" style="display:none"></div>
<div id="log"></div>
<script>
function log(msg) {
  document.getElementById('log').textContent += msg + '\n';
}

window.__context = { glowscript_container: $('#glowscript') };

var prog = 'Web VPython 3.2\nprint("hello from vpython")\nprint("second line")\n';

var compiled;
try {
  compiled = window.glowscript_compile(prog, {lang:'vpython', version:'3.2.3'});
  log('Compiled OK, length=' + compiled.length);
  // Show the __main__ function
  var mainIdx = compiled.indexOf('async function __main__');
  log('--- __main__ body ---');
  log(compiled.slice(mainIdx, mainIdx + 800));
  log('--- end ---');
} catch(e) {
  log('COMPILE ERROR: ' + e.message);
}

async function run() {
  log('\n=== RUNNING ===');
  // Check what GSprint is before running
  log('window.GSprint defined: ' + (typeof window.GSprint));
  log('window.print is: ' + (typeof window.print) + ' / native? ' + (window.print.toString().indexOf('[native code]') >= 0));
  
  try {
    eval(compiled);
    log('eval() done');
    log('typeof __main__: ' + typeof __main__);
    await __main__();
    log('__main__() done');
  } catch(e) {
    log('RUNTIME ERROR: ' + e.message);
    log('STACK: ' + e.stack);
  }
  
  var ta = document.getElementById('print');
  log('textarea#print: ' + (ta ? 'EXISTS, value="' + ta.value + '"' : 'NULL'));
}

setTimeout(run, 300);
</script>
</body>
</html>
