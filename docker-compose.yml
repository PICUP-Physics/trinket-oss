# Shared NODE_CONFIG for the app and the export worker. Overrides hostnames to
# the compose service names and points S3 at the local MinIO. Includes the
# `exports` redis queue host + bucket so the bulk-export worker can run locally.
x-node-config: &node-config >-
  {"app":{"url":{"hostname":"localhost","protocol":"http","port":3000},"plugins":{"session":{"cookieOptions":{"password":"${SESSION_PASSWORD:-change-this-password-for-production-use}"}}}},"db":{"mongo":{"host":"mongodb"},"redis":{"enabled":true,"app":{"host":"redis"},"exports":{"host":"redis"}}},"aws":{"keyId":"minioadmin","key":"minioadmin","endpoint":"http://minio:9000","buckets":{"materials":{"name":"trinket-materials","host":"http://localhost:9000/trinket-materials"},"exports":{"name":"trinket-exports","host":"http://localhost:9000/trinket-exports"}}},"features":{"assets":true}}

services:
  app:
    build: .
    image: trinket/app:latest
    ports:
      - 3000:3000
    container_name: trinket
    volumes:
      - .:/usr/local/node/trinket
      - node_modules:/usr/local/node/trinket/node_modules
      - public_components:/usr/local/node/trinket/public/components
      - public_css:/usr/local/node/trinket/public/css
    networks:
      - trinket
    links:
      - redis
      - mongodb
      - minio
    depends_on:
      minio-init:
        condition: service_completed_successfully
    environment:
      SESSION_PASSWORD: ${SESSION_PASSWORD:-change-this-password-for-production-use}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_CALLBACK_URL: http://localhost:3000/auth/google/callback
      # Run the bulk-export queue worker in-process. The standalone worker can't
      # load config/app.config's route layer cleanly, so it rides along in the
      # app process here (production runs workers as a separate tier).
      RUN_EXPORT_WORKER: "true"
      # Rewrite presigned S3 download URLs from the internal minio:9000 host to
      # one the browser can reach (the published MinIO port).
      S3_PUBLIC_HOST: "localhost:9000"
      NODE_CONFIG: *node-config
  redis:
    image: redis:latest
    ports:
      - 16379:6379
    container_name: redis
    networks:
      - trinket
  mongodb:
    image: mongo:5
    ports:
      - 17017:27017
    container_name: mongodb
    volumes:
      - mongodb_data:/data/db
    networks:
      - trinket
  minio:
    image: minio/minio
    ports:
      - 9000:9000
      - 9001:9001
    container_name: minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - trinket
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
  minio-init:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - trinket
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/trinket-materials;
      mc anonymous set public local/trinket-materials;
      mc mb --ignore-existing local/trinket-exports;
      mc anonymous set public local/trinket-exports;
      "
networks:
  trinket:
    driver: bridge
volumes:
  shared-cache:
  node_modules:
  public_components:
  public_css:
  mongodb_data:
  minio_data:
