services:
  app:
    build: .
    image: trinket/app:latest
    # Long-running services restart automatically after a daemon restart or
    # host reboot (without this, the whole stack stays down until someone runs
    # `docker compose up -d`). garage-init stays restart:"no" — it's a oneshot.
    restart: unless-stopped
    ports:
      # Loopback only: Caddy proxies this on the VPS; local dev uses localhost:3000
      - 127.0.0.1:3000:3000
    container_name: trinket
    volumes:
      - .:/usr/local/node/trinket
      - node_modules:/usr/local/node/trinket/node_modules
      - public_components:/usr/local/node/trinket/public/components
      - public_css:/usr/local/node/trinket/public/css
    networks:
      - trinket
    environment:
      # Run the bulk-export queue worker in-process (the standalone worker can't
      # load the route layer cleanly; production runs workers as a separate tier).
      RUN_EXPORT_WORKER: "true"
      # Optional per-deploy overlay folder (deploys/<name>; see config/deploy-dir.js).
      TRINKET_DEPLOY: "${TRINKET_DEPLOY:-}"
      NODE_CONFIG: |
        {
          "app": {
            "url": {
              "protocol": "${PUBLIC_PROTO:-http}",
              "hostname": "${PUBLIC_HOST:-localhost}",
              "port": "${PUBLIC_PORT-3000}"
            }
          },
          "db": {
            "mongo": { "host": "mongodb" },
            "redis": { "enabled": false }
          },
          "features": {
            "assets": true
          },
          "aws": {
            "keyId": "${GARAGE_KEY_ID}",
            "key": "${GARAGE_SECRET}",
            "region": "garage",
            "endpoint": "http://garage:3900",
            "publicEndpoint": "${S3_PUBLIC_ENDPOINT:-http://localhost:3900}",
            "s3ForcePathStyle": true,
            "signatureVersion": "v4",
            "buckets": {
              "userassets": {
                "name": "trinket-userassets",
                "host": "${ASSET_HOST_USERASSETS:-http://trinket-userassets.localhost:3902}",
                "thumbnail": "thumb-%{s}",
                "thumbnailHost": "${ASSET_HOST_USERASSETS:-http://trinket-userassets.localhost:3902}",
                "thumbnailBucket": "trinket-userassets"
              },
              "snapshots": {
                "name": "trinket-snapshots",
                "host": "${ASSET_HOST_SNAPSHOTS:-http://trinket-snapshots.localhost:3902}"
              },
              "materials": {
                "name": "trinket-materials",
                "host": "${ASSET_HOST_MATERIALS:-http://trinket-materials.localhost:3902}"
              },
              "useravatars": {
                "name": "trinket-useravatars",
                "host": "${ASSET_HOST_USERAVATARS:-http://trinket-useravatars.localhost:3902}"
              },
              "exports": {
                "name": "trinket-exports",
                "host": "${ASSET_HOST_EXPORTS:-http://trinket-exports.localhost:3902}"
              }
            }
          }
        }
    links:
      - redis
      - mongodb
    depends_on:
      redis:
        condition: service_started
      mongodb:
        condition: service_started
      garage-init:
        condition: service_completed_successfully
  garage:
    build:
      context: ./docker/garage
      dockerfile: Dockerfile
    image: trinket/garage:latest
    container_name: garage
    restart: unless-stopped
    command: ["-c", "/etc/garage.toml", "server"]
    environment:
      GARAGE_RPC_SECRET: ${GARAGE_RPC_SECRET}
      GARAGE_ADMIN_TOKEN: ${GARAGE_ADMIN_TOKEN}
    ports:
      # Loopback only: Caddy (or local dev) is the public entry point
      - 127.0.0.1:3900:3900
      - 127.0.0.1:3902:3902
      - 127.0.0.1:3903:3903
    volumes:
      - ./docker/garage/garage.toml:/etc/garage.toml:ro
      - garage_data:/var/lib/garage
    networks:
      - trinket
    healthcheck:
      test: ["CMD", "/garage", "-c", "/etc/garage.toml", "status"]
      interval: 5s
      timeout: 5s
      retries: 24
  garage-init:
    image: trinket/garage:latest
    container_name: garage-init
    entrypoint: ["/bin/sh", "/docker/garage/init.sh"]
    depends_on:
      garage:
        condition: service_started
    environment:
      GARAGE_CONFIG: /etc/garage.toml
      GARAGE_RPC_SECRET: ${GARAGE_RPC_SECRET}
      GARAGE_ACCESS_KEY_ID: ${GARAGE_KEY_ID}
      GARAGE_SECRET_ACCESS_KEY: ${GARAGE_SECRET}
    volumes:
      - ./docker/garage:/docker/garage:ro
      - ./docker/garage/garage.toml:/etc/garage.toml:ro
      - garage_data:/var/lib/garage
    networks:
      - trinket
    restart: "no"
  redis:
    image: redis:latest
    restart: unless-stopped
    ports:
      - 127.0.0.1:16379:6379
    container_name: redis
    networks:
      - trinket
  mongodb:
    image: mongo:5
    restart: unless-stopped
    ports:
      - 127.0.0.1:17017:27017
    container_name: mongodb
    volumes:
      - mongodb_data:/data/db
    networks:
      - trinket
networks:
  trinket:
    driver: bridge
volumes:
  shared-cache:
  node_modules:
  public_components:
  public_css:
  mongodb_data:
  garage_data:
