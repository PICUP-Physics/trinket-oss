{% extends "base.html" %}

{% block extra_css %}
<link rel="stylesheet" href="https://www.gstatic.com/firebasejs/ui/6.1.0/firebase-ui-auth.css">
<style>
  .auth-page-wrapper { padding: 40px 0; }
  #firebaseui-auth-container { max-width: 400px; margin: 0 auto; }
  #auth-error { display: none; max-width: 400px; margin: 10px auto 0; }
</style>
{% endblock %}

{% block content %}
<div class="auth-page-wrapper">
  <div class="row">
    <div class="medium-8 medium-offset-2 small-12 columns text-center">
      <h2>Sign In</h2>
      <p class="subheader">Sign in or create an account below.</p>
    </div>
  </div>

  <div id="firebaseui-auth-container"></div>

  <div id="auth-error" class="row">
    <div class="medium-8 medium-offset-2 small-12 columns">
      <div data-alert class="alert-box alert radius">
        <span id="auth-error-message"></span>
        <a href="#" class="close">&times;</a>
      </div>
    </div>
  </div>

  <div id="auth-verify" class="row" style="display:none">
    <div class="medium-8 medium-offset-2 small-12 columns">
      <div data-alert class="alert-box info radius">
        <p id="auth-verify-message" style="margin-bottom:0.5rem"></p>
        <button id="auth-verify-resend" class="tiny button radius">Resend link</button>
        <button id="auth-verify-continue" class="tiny button radius secondary">I've verified — continue</button>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/ui/6.1.0/firebase-ui-auth__en.js"></script>
<script>
(function() {
  var firebaseConfig  = {% if firebaseConfig %}{{ firebaseConfig | json | safe }}{% else %}{}{% endif %};
  var authEmulatorUrl = {% if authEmulatorUrl %}{{ authEmulatorUrl | json | safe }}{% else %}null{% endif %};

  firebase.initializeApp(firebaseConfig);

  if (authEmulatorUrl) {
    firebase.auth().useEmulator(authEmulatorUrl, { disableWarnings: true });
  }

  var ui = new firebaseui.auth.AuthUI(firebase.auth());

  function showError(message) {
    document.getElementById('auth-error-message').textContent = message;
    document.getElementById('auth-error').style.display = 'block';
  }

  // Exchange the Firebase user's ID token for a server session. forceRefresh so
  // that after a user verifies + reloads, the fresh token carries email_verified.
  function postSession(fbUser) {
    return fbUser.getIdToken(true).then(function(idToken) {
      return fetch('/api/auth/session', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'same-origin',
        body: JSON.stringify({ idToken: idToken })
      });
    })
    .then(function(response) {
      return response.json().then(function(data) { return { ok: response.ok, data: data }; });
    })
    .then(function(result) {
      if (result.ok) {
        window.location.href = result.data.redirect || '/welcome';
      } else if (result.data && result.data.code === 'EMAIL_NOT_VERIFIED') {
        showVerifyNotice(fbUser);   // keep fbUser signed in for resend / continue
      } else {
        showError((result.data && result.data.message) || 'Access denied.');
        firebase.auth().signOut();
      }
    })
    .catch(function() {
      showError('Something went wrong. Please try again.');
      firebase.auth().signOut();
    });
  }

  function showVerifyNotice(fbUser) {
    var addr = fbUser.email || 'your address';
    document.getElementById('auth-error').style.display = 'none';
    document.getElementById('auth-verify-message').textContent =
      'We emailed a verification link to ' + addr + '. Click it, then choose "I\'ve verified — continue".';
    document.getElementById('auth-verify').style.display = 'block';
    document.getElementById('auth-verify-resend').onclick = function() {
      fbUser.sendEmailVerification().then(function() {
        document.getElementById('auth-verify-message').textContent = 'Sent again — check your inbox for ' + addr + '.';
      }).catch(function() { showError('Could not resend right now. Please try again shortly.'); });
    };
    document.getElementById('auth-verify-continue').onclick = function() {
      fbUser.reload().then(function() { return postSession(fbUser); });
    };
  }

  ui.start('#firebaseui-auth-container', {
    signInOptions: [
      firebase.auth.EmailAuthProvider.PROVIDER_ID,
      firebase.auth.GoogleAuthProvider.PROVIDER_ID
    ],
    signInFlow: 'popup',
    callbacks: {
      signInSuccessWithAuthResult: function(authResult) {
        var fbUser = authResult.user;
        var isNew  = !!(authResult.additionalUserInfo && authResult.additionalUserInfo.isNewUser);
        var isPassword = (fbUser.providerData || []).some(function(p) { return p.providerId === 'password'; });

        // Fresh email/password signup with an unverified email: send the Firebase
        // verification link now, so the user can complete verification. (Google
        // sign-ins are already verified and skip this.)
        var pre = (isNew && isPassword && !fbUser.emailVerified)
          ? fbUser.sendEmailVerification().catch(function() {})
          : Promise.resolve();

        pre.then(function() { return postSession(fbUser); });

        return false; // prevent FirebaseUI from handling the redirect
      },
      signInFailure: function(error) {
        showError(error.message || 'Sign-in failed. Please try again.');
        return Promise.resolve();
      }
    },
    tosUrl: '/terms',
    privacyPolicyUrl: '/privacy'
  });
})();
</script>
{% endblock %}
